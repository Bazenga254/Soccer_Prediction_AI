<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Spark AI - Goal!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px; height: 370px; overflow: hidden;
      background: #0f172a; color: #e2e8f0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 16px;
      user-select: none;
      animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .headline { font-size: 24px; font-weight: 800; margin-bottom: 8px; text-shadow: 0 2px 12px rgba(0,0,0,0.4); letter-spacing: 0.5px; }
    .vis-container {
      width: 260px; height: 150px; border-radius: 16px; overflow: hidden;
      margin-bottom: 10px; position: relative;
    }
    .score { font-size: 20px; font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; }
    .sub-message { font-size: 13px; color: #94a3b8; margin-bottom: 2px; }
    .elapsed { font-size: 11px; color: #64748b; margin-top: 2px; }
    .dismiss { font-size: 10px; color: #475569; margin-top: 6px; }
    .close-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: linear-gradient(90deg, #3b82f6, #60a5fa); animation: shrink 8s linear forwards; }

    @keyframes shrink { from { width: 100%; } to { width: 0%; } }
    @keyframes slideIn { from { opacity: 0; transform: scale(0.7) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    .tracking_started { color: #818cf8; }
    .celebration { color: #22c55e; }
    .sad { color: #ef4444; }
    .worried { color: #f59e0b; }
    .big_lead { color: #22c55e; }
    .match_won { color: #22c55e; }
    .match_lost { color: #ef4444; }
    .match_draw { color: #f59e0b; }

    .anim-scene {
      width: 100%; height: 100%; position: relative;
      border-radius: 16px; overflow: hidden;
    }
    .anim-scene.celebration, .anim-scene.big_lead, .anim-scene.match_won {
      background: radial-gradient(ellipse at 50% 120%, #064e3b 0%, #0f172a 70%);
    }
    .anim-scene.tracking_started {
      background: radial-gradient(ellipse at 50% 120%, #312e81 0%, #0f172a 70%);
    }
    .anim-scene.sad, .anim-scene.match_lost {
      background: radial-gradient(ellipse at 50% 120%, #450a0a 0%, #0f172a 70%);
    }
    .anim-scene.worried, .anim-scene.match_draw {
      background: radial-gradient(ellipse at 50% 120%, #451a03 0%, #0f172a 70%);
    }

    .main-emoji {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 56px; z-index: 10;
      animation: emojiPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, emojiFloat 2s ease-in-out 0.5s infinite alternate;
    }
    @keyframes emojiPop { from { transform: translate(-50%, -50%) scale(0); } to { transform: translate(-50%, -50%) scale(1); } }
    @keyframes emojiFloat { from { transform: translate(-50%, -50%) scale(1) translateY(0); } to { transform: translate(-50%, -50%) scale(1.1) translateY(-8px); } }

    .glow-ring {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px; border-radius: 50%;
      z-index: 5; opacity: 0.5;
      animation: glowPulse 1.5s ease-in-out infinite alternate;
    }
    @keyframes glowPulse { from { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; } to { transform: translate(-50%, -50%) scale(1.4); opacity: 0.7; } }

    .confetti {
      position: absolute; border-radius: 2px; z-index: 8;
      animation: confettiFall linear infinite;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(170px) rotate(720deg) scale(0.5); opacity: 0; }
    }

    .sparkle {
      position: absolute; z-index: 9; font-size: 14px;
      animation: sparkleAnim ease-in-out infinite alternate;
    }
    @keyframes sparkleAnim {
      from { transform: scale(0.5) rotate(0deg); opacity: 0.4; }
      to { transform: scale(1.2) rotate(180deg); opacity: 1; }
    }

    .burst-ray {
      position: absolute; top: 50%; left: 50%; width: 2px; z-index: 3;
      transform-origin: bottom center; opacity: 0;
      animation: burstOut 0.8s ease-out forwards;
    }
    @keyframes burstOut {
      0% { height: 0; opacity: 0.8; }
      60% { height: 80px; opacity: 0.6; }
      100% { height: 100px; opacity: 0; }
    }

    .float-emoji {
      position: absolute; z-index: 7; font-size: 20px; opacity: 0;
      animation: floatUp 2s ease-out forwards;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-120px) scale(1); opacity: 0; }
    }

    .rain {
      position: absolute; width: 1px; background: linear-gradient(to bottom, transparent, #64748b);
      z-index: 6; animation: rainFall linear infinite;
    }
    @keyframes rainFall {
      from { transform: translateY(-20px); opacity: 0.7; }
      to { transform: translateY(170px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="headline" id="headline"></div>
  <div class="vis-container">
    <div class="anim-scene" id="scene"></div>
  </div>
  <div class="score" id="score"></div>
  <div class="sub-message" id="sub"></div>
  <div class="elapsed" id="elapsed"></div>
  <div class="dismiss">Tap anywhere to dismiss</div>
  <div class="close-bar"></div>
  <script src="goal-notification.js"></script>
</body>
</html>
